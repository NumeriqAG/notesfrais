<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NotesFrais — Mike</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--surface:#fff;--s2:#F0EDE8;
  --text:#1A1A1A;--t2:#6B6560;--t3:#9E9892;
  --acc:#2D5BE3;--accl:#EEF2FD;
  --grn:#0F6E56;--grnl:#E1F5EE;
  --amb:#BA7517;--ambl:#FAEEDA;
  --red:#A32D2D;--redl:#FCEBEB;
  --bdr:#E8E4DE;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;border:0.5px solid var(--bdr);border-radius:9px;background:var(--s2);color:var(--text);outline:none;width:100%;transition:border-color 0.15s,background 0.15s}
input:focus,select:focus{border-color:var(--acc);background:#fff}
button{font-family:'DM Sans',sans-serif;transition:opacity 0.15s,transform 0.1s}
button:active{transform:scale(0.97)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer}
.btn:hover{opacity:0.9}
.btn-g{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 13px;background:var(--s2);color:var(--text);border:0.5px solid var(--bdr);border-radius:10px;font-size:13px;cursor:pointer}
.btn-g:hover{background:#e8e4de}
.card{background:#fff;border-radius:14px;border:0.5px solid var(--bdr);padding:16px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
.lbl{display:block;font-size:10px;color:var(--t3);margin-bottom:5px;letter-spacing:0.05em;text-transform:uppercase;font-weight:500}
.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script type="text/babel">
const {useState, useRef, useEffect, useCallback} = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const CATS = [
  {id:'repas',    l:'Repas',     i:'🍽'},
  {id:'transport',l:'Transport', i:'🚆'},
  {id:'hotel',    l:'Hôtel',     i:'🏨'},
  {id:'materiel', l:'Matériel',  i:'💻'},
  {id:'autre',    l:'Autre',     i:'📎'},
];
const CATM = Object.fromEntries(CATS.map(c => [c.id, c]));
const CURR = ['CHF','EUR','USD','GBP','JPY','CAD'];
const MONTHS = ['2026-01','2026-02','2026-03'];

const fmt  = n  => Number(n || 0).toFixed(2);
const fmtK = n  => Number(n || 0) > 999 ? (Number(n)/1000).toFixed(1)+'k' : fmt(n);
const fmtDate = d => { try { return new Date((d||'')+'T12:00').toLocaleDateString('fr-CH',{day:'2-digit',month:'short'})} catch{ return d||''; }};
const mTotal  = arr => arr.reduce((s,e) => s + Number(e.amtChf || e.amount || 0), 0);

const INIT_EXP = [
  {id:1, date:'2026-03-14', merchant:'Restaurant Le Bistrot', amount:45.80,  amtChf:45.80,  tva:4.58, cat:'repas',     cur:'CHF', status:'reconciled', note:'Déjeuner client Accenture'},
  {id:2, date:'2026-03-13', merchant:'SBB CFF FFS',           amount:32.00,  amtChf:32.00,  tva:0,    cat:'transport', cur:'CHF', status:'pending',    note:'Train Genève–Lausanne'},
  {id:3, date:'2026-03-11', merchant:'Ibis Budget Lausanne',  amount:89.00,  amtChf:89.00,  tva:6.63, cat:'hotel',     cur:'CHF', status:'pending',    note:''},
  {id:4, date:'2026-03-10', merchant:'Apple Store',           amount:129.00, amtChf:129.00, tva:9.62, cat:'materiel',  cur:'CHF', status:'reconciled', note:'Câble USB-C'},
  {id:5, date:'2026-03-07', merchant:'Taxi Genève',           amount:24.50,  amtChf:24.50,  tva:0,    cat:'transport', cur:'CHF', status:'pending',    note:''},
];

const INIT_RATES = {
  '2026-01': {EUR:0.95, USD:0.88, GBP:1.10, JPY:0.0058, CAD:0.64},
  '2026-02': {EUR:0.95, USD:0.88, GBP:1.11, JPY:0.0059, CAD:0.64},
  '2026-03': {EUR:0.96, USD:0.89, GBP:1.12, JPY:0.0059, CAD:0.65},
};

const DEMO_CSV = `date,description,montant
2026-03-14,RESTAURANT LE BISTROT,45.80
2026-03-13,SBB TICKETSHOP,32.00
2026-03-11,IBIS BUDGET LAUSANNE,89.00
2026-03-10,APPLE STORE GENEVE,129.00
2026-03-07,TAXI GENEVE SA,24.50
2026-03-09,COOP SUPERMARCHE,18.30
2026-03-06,UBER EATS,34.90`;

// ─── UTILITIES ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  return lines.slice(1).map((l, i) => {
    const c = l.split(/[,;]/).map(x => x.trim().replace(/^"|"$/g, ''));
    const amt = Math.abs(parseFloat((c[2]||'0').replace(/[^0-9.,\-]/g,'').replace(',','.')) || 0);
    if (amt === 0) return null;
    return {id:'cb'+i+'_'+Date.now(), date:c[0], description:c[1]||'Transaction', amount:amt, matched:false, expId:null};
  }).filter(Boolean);
}

function autoMatch(txs, expenses) {
  const recIds = new Set();
  const out = txs.map(tx => {
    const found = expenses.find(e => {
      const close = Math.abs((e.amtChf || e.amount) - tx.amount) < 0.10;
      const words = tx.description.toLowerCase().split(/\s+/);
      const nameMatch = words.some(w => w.length > 3 && e.merchant.toLowerCase().includes(w));
      return close && nameMatch && e.status !== 'reconciled';
    });
    if (found) { recIds.add(found.id); return {...tx, matched:true, expId:found.id}; }
    return tx;
  });
  return {txs: out, recIds};
}

// ─── SMALL COMPONENTS ────────────────────────────────────────────────────────
function Badge({s}) {
  const m = {
    pending:    {bg:'var(--ambl)', c:'var(--amb)', t:'En attente'},
    reconciled: {bg:'var(--grnl)', c:'var(--grn)', t:'Réconcilié'},
    submitted:  {bg:'var(--accl)', c:'var(--acc)', t:'Soumis'},
  };
  const x = m[s] || m.pending;
  return <span style={{background:x.bg, color:x.c, fontSize:10, fontWeight:500, padding:'2px 7px', borderRadius:20, whiteSpace:'nowrap'}}>{x.t}</span>;
}

function Toast({msg}) {
  if (!msg) return null;
  return <div style={{position:'fixed', top:20, left:'50%', transform:'translateX(-50%)', background:'#1A1A1A', color:'#fff', padding:'10px 20px', borderRadius:99, fontSize:13, zIndex:400, whiteSpace:'nowrap', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', animation:'fadeIn 0.2s ease'}}>{msg}</div>;
}

// ─── OCR MODAL ───────────────────────────────────────────────────────────────
function OCRModal({onClose, onAdd, rates, month}) {
  const [step, setStep] = useState('capture');
  const [prog, setProg] = useState(0);
  const [ocrLog, setOcrLog] = useState('Initialisation…');
  const [form, setForm] = useState({merchant:'', amount:'', tva:'', date:new Date().toISOString().split('T')[0], cat:'autre', cur:'CHF', note:''});
  const fileRef = useRef();

  const rateFor = cur => cur === 'CHF' ? 1 : (rates?.[month]?.[cur] || 1);
  const amtChf = () => { const a = parseFloat(form.amount) || 0; return form.cur === 'CHF' ? a : a * rateFor(form.cur); };

  const parseText = txt => {
    const amtM = txt.match(/(?:total|montant|CHF|Fr\.?|total\s+CHF)\s*[:.]?\s*(\d+[.,]\d{2})/i)
                || txt.match(/(\d{2,4}[.,]\d{2})/);
    const tvaM = txt.match(/(?:TVA|MwSt|VAT)\s*[:.]?\s*(\d+[.,]\d{2})/i);
    const dM   = txt.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
    const lines = txt.split('\n').filter(l => l.trim().length > 3);
    const merchant = (lines[0] || 'Commerçant').trim().substring(0, 50);
    let date = new Date().toISOString().split('T')[0];
    if (dM) {
      const y = dM[3].length === 2 ? '20'+dM[3] : dM[3];
      date = `${y}-${dM[2].padStart(2,'0')}-${dM[1].padStart(2,'0')}`;
    }
    return {
      merchant,
      amount: amtM ? amtM[1].replace(',','.') : '',
      tva:    tvaM ? tvaM[1].replace(',','.') : '',
      date, cat:'autre', cur:'CHF', note:''
    };
  };

  const runOCR = async file => {
    setStep('scanning'); setProg(0);
    try {
      if (typeof Tesseract === 'undefined') {
        setOcrLog('Tesseract.js non disponible — saisie manuelle');
        setTimeout(() => setStep('review'), 1200);
        return;
      }
      setOcrLog('Chargement du moteur OCR…');
      const worker = await Tesseract.createWorker('fra', 1, {
        logger: m => {
          if (m.status === 'recognizing text') {
            const p = Math.round(m.progress * 100);
            setProg(p);
            setOcrLog(`Reconnaissance du texte… ${p}%`);
          } else if (m.status === 'loading tesseract core') {
            setOcrLog('Chargement Tesseract…');
          } else if (m.status === 'initializing tesseract') {
            setOcrLog('Initialisation…');
          }
        }
      });
      const {data: {text}} = await worker.recognize(file);
      await worker.terminate();
      const parsed = parseText(text);
      setForm(parsed);
      setStep('review');
    } catch(e) {
      setOcrLog('Erreur OCR — saisie manuelle');
      setTimeout(() => setStep('review'), 800);
    }
  };

  return (
    <div className="overlay">
      <div className="sheet">
        {step === 'capture' && <>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
            <h2 style={{fontSize:17, fontWeight:600}}>Ajouter un frais</h2>
            <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', fontSize:22, lineHeight:1}}>×</button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => runOCR(e.target.files[0])}/>
          <div onClick={() => fileRef.current.click()} style={{border:'2px dashed var(--bdr)', borderRadius:14, padding:36, textAlign:'center', background:'var(--s2)', cursor:'pointer', marginBottom:14, transition:'background 0.2s'}}
            onMouseEnter={e => e.currentTarget.style.background='#e8e4de'}
            onMouseLeave={e => e.currentTarget.style.background='var(--s2)'}>
            <div style={{fontSize:42, marginBottom:10}}>📷</div>
            <div style={{fontWeight:500, marginBottom:4}}>Photo du ticket ou reçu</div>
            <div style={{fontSize:11, color:'var(--t3)', lineHeight:1.5}}>OCR local via Tesseract.js<br/>Aucune donnée envoyée à l'extérieur</div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10}}>
            <button className="btn" onClick={() => fileRef.current.click()}>📷 Prendre photo</button>
            <button className="btn-g" onClick={() => fileRef.current.click()}>📂 Importer fichier</button>
          </div>
          <button className="btn-g" style={{width:'100%'}} onClick={() => setStep('review')}>✏️ Saisie manuelle</button>
        </>}

        {step === 'scanning' && (
          <div style={{textAlign:'center', padding:'48px 20px'}}>
            <div style={{fontSize:48, marginBottom:16}}>🔍</div>
            <div style={{fontWeight:600, fontSize:16, marginBottom:8}}>Analyse en cours…</div>
            <div style={{fontSize:12, color:'var(--t3)', marginBottom:20, minHeight:18}}>{ocrLog}</div>
            <div style={{height:8, background:'var(--s2)', borderRadius:99, overflow:'hidden', maxWidth:240, margin:'0 auto'}}>
              <div style={{width:prog+'%', height:'100%', background:'var(--acc)', borderRadius:99, transition:'width 0.3s ease'}}/>
            </div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:8}}>{prog}%</div>
          </div>
        )}

        {step === 'review' && <>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
            <h2 style={{fontSize:17, fontWeight:600}}>Vérifier les informations</h2>
            <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', fontSize:22, lineHeight:1}}>×</button>
          </div>
          {form.merchant && (
            <div style={{background:'var(--grnl)', borderRadius:9, padding:'9px 13px', marginBottom:16, fontSize:12, color:'var(--grn)', display:'flex', alignItems:'center', gap:6}}>
              ✓ OCR terminé — vérifiez et confirmez les données extraites
            </div>
          )}
          <div style={{display:'grid', gap:12}}>
            <div>
              <label className="lbl">Commerçant</label>
              <input value={form.merchant} onChange={e => setForm({...form, merchant:e.target.value})} placeholder="Nom du commerçant"/>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <label className="lbl">Montant</label>
                <input type="number" step="0.01" value={form.amount} onChange={e => setForm({...form, amount:e.target.value})} placeholder="0.00"/>
              </div>
              <div>
                <label className="lbl">Devise</label>
                <select value={form.cur} onChange={e => setForm({...form, cur:e.target.value})}>
                  {CURR.map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            {form.cur !== 'CHF' && (
              <div style={{background:'var(--ambl)', borderRadius:9, padding:'9px 13px', fontSize:12, color:'var(--amb)'}}>
                Taux {form.cur}/CHF : <strong>{rateFor(form.cur)}</strong> → Équivalent <strong>CHF {fmt(amtChf())}</strong>
                {!rates?.[month]?.[form.cur] && <div style={{marginTop:4, fontSize:11}}>⚠️ Taux non configuré — allez dans Réglages</div>}
              </div>
            )}
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <label className="lbl">TVA</label>
                <input type="number" step="0.01" value={form.tva} onChange={e => setForm({...form, tva:e.target.value})} placeholder="0.00"/>
              </div>
              <div>
                <label className="lbl">Date</label>
                <input type="date" value={form.date} onChange={e => setForm({...form, date:e.target.value})}/>
              </div>
            </div>
            <div>
              <label className="lbl">Catégorie</label>
              <select value={form.cat} onChange={e => setForm({...form, cat:e.target.value})}>
                {CATS.map(c => <option key={c.id} value={c.id}>{c.i} {c.l}</option>)}
              </select>
            </div>
            <div>
              <label className="lbl">Note (optionnel)</label>
              <input value={form.note} onChange={e => setForm({...form, note:e.target.value})} placeholder="Précisions…"/>
            </div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:18}}>
            <button className="btn-g" onClick={onClose}>Annuler</button>
            <button className="btn" onClick={() => { onAdd({...form, amtChf: amtChf()}); onClose(); }}>✓ Confirmer</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── HOME TAB ────────────────────────────────────────────────────────────────
function HomeTab({exps, total, pending, recon, byCat, onAdd, onExport, onReconcile, forgotten}) {
  const [sub, setSub] = useState(false);
  const tva = exps.reduce((s,e) => s + Number(e.tva||0), 0);

  return (
    <div style={{display:'grid', gap:14, paddingBottom:24}}>
      {/* Summary card */}
      <div style={{background:'var(--acc)', borderRadius:18, padding:'20px 20px 18px', color:'#fff'}}>
        <div style={{fontSize:10, opacity:0.7, letterSpacing:'0.1em', marginBottom:3}}>TOTAL DU MOIS</div>
        <div className="mono" style={{fontSize:36, fontWeight:700, marginBottom:10, letterSpacing:'-0.02em'}}>CHF {fmt(total)}</div>
        <div style={{display:'flex', gap:12, fontSize:11, opacity:0.85, flexWrap:'wrap'}}>
          <span>{exps.length} frais</span>
          <span>·</span>
          <span style={{color:'#90EE90'}}>✓ {recon.length} réconciliés</span>
          <span>·</span>
          <span>{pending.length} en attente</span>
          <span>·</span>
          <span>TVA: CHF {fmt(tva)}</span>
        </div>
      </div>

      {/* Forgotten alert */}
      {forgotten > 0 && (
        <div onClick={onReconcile} style={{background:'var(--redl)', borderRadius:12, padding:'13px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer', border:'0.5px solid #f5c0b0'}}>
          <div style={{color:'var(--red)'}}>
            <div style={{fontWeight:600, fontSize:13}}>⚠️ {forgotten} frais non déclarés détectés</div>
            <div style={{fontSize:11, marginTop:2, opacity:0.8}}>Présents sur votre relevé CB mais absents de l'app</div>
          </div>
          <span style={{color:'var(--red)', fontSize:18}}>→</span>
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        <button className="btn" onClick={onAdd} style={{padding:'14px'}}>📷 Ajouter un frais</button>
        <button className="btn-g" onClick={onExport} style={{padding:'14px'}}>⬇️ Exporter</button>
      </div>

      {/* Categories */}
      {byCat.length > 0 && (
        <div className="card">
          <div style={{fontSize:12, fontWeight:500, marginBottom:14, color:'var(--t2)'}}>Répartition par catégorie</div>
          {byCat.sort((a,b) => b.total - a.total).map(c => {
            const p = total > 0 ? Math.round(c.total / total * 100) : 0;
            return (
              <div key={c.id} style={{marginBottom:12}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:5, alignItems:'center'}}>
                  <span style={{display:'flex', alignItems:'center', gap:6}}><span style={{fontSize:16}}>{c.i}</span>{c.l}</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span style={{fontSize:11, color:'var(--t3)'}}>{p}%</span>
                    <span className="mono" style={{fontWeight:500, fontSize:13}}>CHF {fmt(c.total)}</span>
                  </div>
                </div>
                <div style={{height:6, background:'var(--s2)', borderRadius:99}}>
                  <div style={{width:p+'%', height:'100%', background:'var(--acc)', borderRadius:99, transition:'width 0.6s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Submit */}
      <button className="btn" onClick={() => setSub(true)} style={{padding:'15px', background: sub ? 'var(--grn)' : 'var(--acc)', transition:'background 0.3s'}}>
        {sub ? '✓ Frais soumis avec succès !' : '📤 Soumettre mes frais du mois'}
      </button>
    </div>
  );
}

// ─── HISTORY TAB ─────────────────────────────────────────────────────────────
function HistoryTab({exps, onDelete, onAdd}) {
  const [cat, setCat] = useState('all');
  const filtered = cat === 'all' ? exps : exps.filter(e => e.cat === cat);
  const total = mTotal(filtered);

  return (
    <div style={{display:'grid', gap:10, paddingBottom:24}}>
      {/* Category filter */}
      <div style={{display:'flex', gap:6, overflowX:'auto', paddingBottom:4}}>
        {[{id:'all', l:'Tous', i:''}, ...CATS].map(c => (
          <button key={c.id} onClick={() => setCat(c.id)} className="btn-g"
            style={{padding:'5px 11px', fontSize:12, whiteSpace:'nowrap',
              border: cat === c.id ? '2px solid var(--acc)' : '0.5px solid var(--bdr)',
              background: cat === c.id ? 'var(--accl)' : 'var(--s2)',
              color: cat === c.id ? 'var(--acc)' : 'var(--t2)'}}>
            {c.i} {c.l}
          </button>
        ))}
      </div>

      {/* Total line */}
      {filtered.length > 0 && (
        <div style={{display:'flex', justifyContent:'space-between', fontSize:12, color:'var(--t3)', padding:'4px 2px'}}>
          <span>{filtered.length} frais</span>
          <span className="mono" style={{fontWeight:500}}>Total CHF {fmt(total)}</span>
        </div>
      )}

      {/* List */}
      {filtered.length === 0 ? (
        <div style={{textAlign:'center', padding:'44px 20px', color:'var(--t3)'}}>
          <div style={{fontSize:40, marginBottom:12}}>📭</div>
          <div style={{fontWeight:500, marginBottom:4}}>Aucun frais trouvé</div>
          <button className="btn" onClick={onAdd} style={{marginTop:12}}>+ Ajouter</button>
        </div>
      ) : filtered.map(e => (
        <div key={e.id} style={{background:'#fff', borderRadius:12, padding:'12px 14px', border:'0.5px solid var(--bdr)', display:'flex', gap:11, alignItems:'center'}}>
          <div style={{width:42, height:42, borderRadius:10, background:'var(--s2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0}}>
            {CATM[e.cat]?.i || '📎'}
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontWeight:500, fontSize:13, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{e.merchant}</div>
            <div style={{fontSize:11, color:'var(--t3)', marginTop:3, display:'flex', gap:6, alignItems:'center', flexWrap:'wrap'}}>
              <span>{fmtDate(e.date)}</span>
              <Badge s={e.status}/>
            </div>
            {e.note && <div style={{fontSize:11, color:'var(--t2)', marginTop:2, fontStyle:'italic', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{e.note}</div>}
          </div>
          <div style={{textAlign:'right', flexShrink:0}}>
            <div className="mono" style={{fontWeight:600, fontSize:14}}>CHF {fmt(e.amtChf || e.amount)}</div>
            {e.cur !== 'CHF' && <div style={{fontSize:10, color:'var(--t3)'}}>{fmt(e.amount)} {e.cur}</div>}
            <button onClick={() => onDelete(e.id)} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', marginTop:5, padding:'2px', fontSize:14}}>🗑</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── RECONCILE TAB ───────────────────────────────────────────────────────────
function ReconcileTab({expenses, setExpenses, cbTxs, setCbTxs}) {
  const fileRef = useRef();
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 3500); };

  const handleFile = file => {
    setLoading(true);
    const r = new FileReader();
    r.onload = e => {
      const txs = parseCSV(e.target.result);
      if (!txs.length) { showToast('❌ Format non reconnu — vérifiez le fichier CSV'); setLoading(false); return; }
      const {txs: matched, recIds} = autoMatch(txs, expenses);
      setCbTxs(matched);
      setExpenses(prev => prev.map(e => ({...e, status: recIds.has(e.id) ? 'reconciled' : e.status})));
      showToast(`✅ ${txs.length} transactions importées · ${recIds.size} réconciliées automatiquement`);
      setLoading(false);
    };
    r.onerror = () => { showToast('❌ Erreur de lecture du fichier'); setLoading(false); };
    r.readAsText(file);
  };

  const loadDemo = () => {
    const txs = parseCSV(DEMO_CSV);
    const {txs: matched, recIds} = autoMatch(txs, expenses);
    setCbTxs(matched);
    setExpenses(prev => prev.map(e => ({...e, status: recIds.has(e.id) ? 'reconciled' : e.status})));
    showToast(`✅ Démo chargée · ${txs.length} transactions · ${recIds.size} réconciliées`);
  };

  const manualMatch = (cbId, expId) => {
    setCbTxs(prev => prev.map(t => t.id === cbId ? {...t, matched:true, expId} : t));
    setExpenses(prev => prev.map(e => e.id === expId ? {...e, status:'reconciled'} : e));
    showToast('✅ Réconciliation manuelle effectuée');
  };

  const unmatch = cbId => {
    const tx = cbTxs.find(t => t.id === cbId);
    if (tx?.expId) setExpenses(prev => prev.map(e => e.id === tx.expId ? {...e, status:'pending'} : e));
    setCbTxs(prev => prev.map(t => t.id === cbId ? {...t, matched:false, expId:null} : t));
    showToast('↩️ Réconciliation annulée');
  };

  const forgotten = cbTxs.filter(t => !t.matched && t.amount > 5);
  const matched   = cbTxs.filter(t =>  t.matched);
  const unmatched = cbTxs.filter(t => !t.matched);
  const pendingExp = expenses.filter(e => e.status === 'pending');

  return (
    <div style={{display:'grid', gap:14, paddingBottom:24}}>
      <Toast msg={toast}/>

      {/* Import zone */}
      <div className="card">
        <div style={{fontWeight:600, fontSize:14, marginBottom:6}}>Importer le relevé CB</div>
        <div style={{fontSize:12, color:'var(--t3)', marginBottom:14, lineHeight:1.6}}>
          Format CSV attendu :<br/>
          <code style={{background:'var(--s2)', padding:'3px 8px', borderRadius:5, fontFamily:'DM Mono', fontSize:11}}>date, description, montant</code>
          <br/><span style={{fontSize:11}}>Compatible avec les exports UBS, PostFinance, Raiffeisen, CS…</span>
        </div>
        <input ref={fileRef} type="file" accept=".csv,.txt,.xls,.xlsx" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])}/>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <button className="btn" onClick={() => fileRef.current.click()} style={{opacity: loading ? 0.6 : 1}}>
            {loading ? '⏳ Import…' : '📂 Importer CSV'}
          </button>
          <button className="btn-g" onClick={loadDemo}>🎭 Données démo</button>
        </div>
      </div>

      {cbTxs.length > 0 && <>
        {/* Stats */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10}}>
          {[
            {l:'Transactions', v:cbTxs.length,    c:undefined},
            {l:'Réconciliées', v:matched.length,   c:'var(--grn)'},
            {l:'Oublis CB',    v:forgotten.length,  c: forgotten.length ? 'var(--red)' : 'var(--t3)'},
          ].map((s,i) => (
            <div key={i} style={{background:'#fff', borderRadius:12, border:'0.5px solid var(--bdr)', padding:'12px', textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--t3)', marginBottom:5, letterSpacing:'0.04em'}}>{s.l.toUpperCase()}</div>
              <div className="mono" style={{fontSize:24, fontWeight:700, color: s.c || 'var(--text)'}}>{s.v}</div>
            </div>
          ))}
        </div>

        {/* Forgotten expenses */}
        {forgotten.length > 0 && (
          <div className="card" style={{border:'0.5px solid #f5b0b0'}}>
            <div style={{color:'var(--red)', fontWeight:600, fontSize:13, marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
              ⚠️ Frais non déclarés — présents sur CB ({forgotten.length})
            </div>
            <div style={{fontSize:11, color:'var(--t3)', marginBottom:12}}>Ces transactions apparaissent sur votre relevé bancaire mais n'ont pas été saisies dans l'app.</div>
            {forgotten.map(t => (
              <div key={t.id} style={{padding:'10px 0', borderBottom:'0.5px solid var(--bdr)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13, fontWeight:500}}>{t.description}</div>
                  <div style={{fontSize:11, color:'var(--t3)', marginTop:2}}>{fmtDate(t.date)}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="mono" style={{fontWeight:700, color:'var(--red)', fontSize:14}}>CHF {fmt(t.amount)}</div>
                  <div style={{fontSize:10, color:'var(--t3)'}}>non saisi</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Reconciled */}
        {matched.length > 0 && (
          <div className="card">
            <div style={{color:'var(--grn)', fontWeight:600, fontSize:13, marginBottom:12}}>
              ✓ Réconciliées automatiquement ({matched.length})
            </div>
            {matched.map(t => {
              const exp = expenses.find(e => e.id === t.expId);
              return (
                <div key={t.id} style={{padding:'10px 0', borderBottom:'0.5px solid var(--bdr)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13, fontWeight:500}}>{t.description}</div>
                    {exp && <div style={{fontSize:11, color:'var(--grn)', marginTop:2}}>→ {exp.merchant}</div>}
                    <div style={{fontSize:10, color:'var(--t3)'}}>{fmtDate(t.date)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="mono" style={{fontWeight:600, fontSize:13}}>CHF {fmt(t.amount)}</div>
                    <button onClick={() => unmatch(t.id)} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', fontSize:10, marginTop:3}}>annuler</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Manual matching */}
        {unmatched.filter(t => t.amount > 1).length > 0 && pendingExp.length > 0 && (
          <div className="card">
            <div style={{fontWeight:600, fontSize:13, marginBottom:4}}>Réconciliation manuelle</div>
            <div style={{fontSize:12, color:'var(--t3)', marginBottom:14}}>Associez manuellement les transactions non reconnues</div>
            {unmatched.filter(t => t.amount > 1).map(t => (
              <div key={t.id} style={{marginBottom:12, padding:12, background:'var(--s2)', borderRadius:10}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:10, alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontSize:13, fontWeight:500}}>{t.description}</div>
                    <div style={{fontSize:11, color:'var(--t3)', marginTop:2}}>{fmtDate(t.date)}</div>
                  </div>
                  <div className="mono" style={{fontWeight:600, fontSize:13}}>CHF {fmt(t.amount)}</div>
                </div>
                <select defaultValue="" onChange={e => { if (e.target.value) manualMatch(t.id, parseInt(e.target.value)); }} style={{fontSize:12, padding:'7px 10px'}}>
                  <option value="">Lier à une dépense existante…</option>
                  {pendingExp.map(e => (
                    <option key={e.id} value={e.id}>{e.merchant} — {fmtDate(e.date)} — CHF {fmt(e.amtChf || e.amount)}</option>
                  ))}
                </select>
              </div>
            ))}
          </div>
        )}
      </>}

      {cbTxs.length === 0 && (
        <div style={{textAlign:'center', padding:'48px 20px', color:'var(--t3)'}}>
          <div style={{fontSize:48, marginBottom:14}}>🏦</div>
          <div style={{fontWeight:500, fontSize:15, marginBottom:6}}>Aucun relevé importé</div>
          <div style={{fontSize:12, lineHeight:1.6}}>Importez votre fichier CSV bancaire pour<br/>réconcilier automatiquement vos frais</div>
        </div>
      )}
    </div>
  );
}

          <div>OCR local • Tesseract.js 5</div>
          <div>Données stockées localement</div>
          <div>Aucune donnée envoyée à l'extérieur</div>
        </div>
      </div>
    </div>
  );
}

// ─── EXPORT MODAL ────────────────────────────────────────────────────────────
function ExportModal({exps, onClose}) {
  const [type, setType] = useState('pdf');
  const [done, setDone] = useState(false);
  const total = mTotal(exps);
  const tva   = exps.reduce((s,e) => s + Number(e.tva||0), 0);

  const doExport = () => {
    if (type === 'csv') {
      const header = 'Date,Commerçant,Catégorie,Montant original,Devise,Montant CHF,TVA,Statut,Note';
      const rows   = exps.map(e => [e.date, `"${e.merchant}"`, CATM[e.cat]?.l||e.cat, fmt(e.amount), e.cur, fmt(e.amtChf||e.amount), fmt(e.tva), e.status, `"${e.note||''}"`].join(','));
      const blob   = new Blob([header+'\n'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
      const a      = document.createElement('a');
      a.href       = URL.createObjectURL(blob);
      a.download   = `notes-frais-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }
    setDone(true);
  };

  return (
    <div className="overlay">
      <div className="sheet">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <h2 style={{fontSize:17, fontWeight:600}}>Exporter les frais</h2>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', fontSize:22, lineHeight:1}}>×</button>
        </div>
        {!done ? <>
          <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:16}}>
            {[['pdf','📄','PDF'],['csv','📊','CSV'],['email','📧','Email']].map(([t,i,l]) => (
              <button key={t} onClick={() => setType(t)} className="btn-g"
                style={{flexDirection:'column', gap:4, padding:'12px 8px',
                  border: type===t ? '2px solid var(--acc)' : '0.5px solid var(--bdr)',
                  background: type===t ? 'var(--accl)' : 'var(--s2)',
                  color: type===t ? 'var(--acc)' : 'var(--text)'}}>
                <span style={{fontSize:20}}>{i}</span>
                <span style={{fontSize:12, fontWeight:500}}>{l}</span>
              </button>
            ))}
          </div>
          <div style={{background:'var(--s2)', borderRadius:10, padding:'12px 14px', marginBottom:16}}>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6}}>
              <span style={{color:'var(--t2)'}}>Nombre de frais</span>
              <span style={{fontWeight:500}}>{exps.length}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6}}>
              <span style={{color:'var(--t2)'}}>Total</span>
              <span className="mono" style={{fontWeight:700}}>CHF {fmt(total)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13}}>
              <span style={{color:'var(--t2)'}}>TVA récupérable</span>
              <span className="mono" style={{fontWeight:500}}>CHF {fmt(tva)}</span>
            </div>
          </div>
          {type === 'csv' && <div style={{background:'var(--grnl)', borderRadius:9, padding:'8px 12px', fontSize:12, color:'var(--grn)', marginBottom:14}}>✓ Le fichier CSV sera téléchargé directement</div>}
          {type === 'pdf' && <div style={{background:'var(--ambl)', borderRadius:9, padding:'8px 12px', fontSize:12, color:'var(--amb)', marginBottom:14}}>⚠️ Export PDF — fonctionnalité v2 (intégration jsPDF)</div>}
          {type === 'email' && <div style={{background:'var(--ambl)', borderRadius:9, padding:'8px 12px', fontSize:12, color:'var(--amb)', marginBottom:14}}>⚠️ Envoi email — nécessite un backend (v2)</div>}
          <button className="btn" onClick={doExport} style={{width:'100%'}}>⬇️ Exporter en {type.toUpperCase()}</button>
        </> : (
          <div style={{textAlign:'center', padding:'32px 20px'}}>
            <div style={{fontSize:48, marginBottom:14}}>✅</div>
            <div style={{fontWeight:600, fontSize:16, marginBottom:4}}>Export réussi !</div>
            <div style={{fontSize:13, color:'var(--t3)'}}>
              {type === 'csv' ? 'Votre fichier CSV a été téléchargé.' : 'Fonctionnalité disponible en v2.'}
            </div>
            <button className="btn-g" onClick={onClose} style={{marginTop:20}}>Fermer</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [tab,       setTab      ] = useState('home');
  const [expenses,  setExpenses ] = useState(INIT_EXP);
  const [cbTxs,     setCbTxs   ] = useState([]);
  const [rates,     setRates    ] = useState(INIT_RATES);
  const [showOCR,   setShowOCR  ] = useState(false);
  const [showExport,setShowExport] = useState(false);
  const [month,     setMonth    ] = useState('2026-03');

  const addExp = data => {
    const rate   = data.cur === 'CHF' ? 1 : (rates?.[month]?.[data.cur] || 1);
    const amtChf = data.cur === 'CHF' ? (parseFloat(data.amount)||0) : (parseFloat(data.amount)||0) * rate;
    setExpenses(prev => [{
      id: Date.now(),
      date:     data.date   || new Date().toISOString().split('T')[0],
      merchant: data.merchant || 'Inconnu',
      amount:   parseFloat(data.amount) || 0,
      amtChf,
      tva:      parseFloat(data.tva)    || 0,
      cat:      data.cat    || 'autre',
      cur:      data.cur    || 'CHF',
      status:   'pending',
      note:     data.note   || '',
    }, ...prev]);
    setTab('history');
  };

  const mExp     = expenses.filter(e => e.date.startsWith(month));
  const total    = mTotal(mExp);
  const pending  = mExp.filter(e => e.status === 'pending');
  const recon    = mExp.filter(e => e.status === 'reconciled');
  const byCat    = CATS.map(c => ({...c, total: mExp.filter(e => e.cat === c.id).reduce((s,e) => s+Number(e.amtChf||0), 0)})).filter(c => c.total > 0);
  const forgotten = cbTxs.filter(t => !t.matched && t.amount > 5).length;

  const TABS = [
    ['home',      '🏠', 'Accueil'],
    ['history',   '📋', 'Frais'],
    ['reconcile', '🏦', 'Banque'],
    ['settings',  '⚙️', 'Réglages'],
  ];

  return (
    <div style={{maxWidth:540, margin:'0 auto', background:'var(--bg)', minHeight:'100vh', paddingBottom:76}}>
      {/* HEADER */}
      <div style={{background:'#fff', padding:'18px 18px 14px', borderBottom:'0.5px solid var(--bdr)', position:'sticky', top:0, zIndex:100, boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div style={{fontSize:10, color:'var(--t3)', letterSpacing:'0.1em', marginBottom:2}}>NOTES DE FRAIS</div>
            <div style={{fontSize:19, fontWeight:600}}>Bonjour Mike 👋</div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center'}}>
            {forgotten > 0 && (
              <div style={{background:'var(--redl)', color:'var(--red)', borderRadius:99, fontSize:10, fontWeight:600, padding:'3px 9px', cursor:'pointer'}} onClick={() => setTab('reconcile')}>
                ⚠️ {forgotten} oubli{forgotten>1?'s':''}
              </div>
            )}
            <div style={{width:38, height:38, borderRadius:'50%', background:'var(--acc)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:600, fontSize:15}}>M</div>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:'14px 14px 0'}}>
        {/* Month selector */}
        <div style={{display:'flex', gap:6, marginBottom:14, overflowX:'auto', paddingBottom:4}}>
          {MONTHS.map(m => (
            <button key={m} onClick={() => setMonth(m)} className="btn-g"
              style={{padding:'5px 13px', fontSize:12, whiteSpace:'nowrap',
                border:  month===m ? '2px solid var(--acc)' : '0.5px solid var(--bdr)',
                background: month===m ? 'var(--accl)' : 'var(--s2)',
                color:   month===m ? 'var(--acc)' : 'var(--t2)'}}>
              {new Date(m+'-15').toLocaleDateString('fr-CH', {month:'long', year:'2-digit'})}
            </button>
          ))}
        </div>

        {tab === 'home'      && <HomeTab exps={mExp} total={total} pending={pending} recon={recon} byCat={byCat} onAdd={() => setShowOCR(true)} onExport={() => setShowExport(true)} onReconcile={() => setTab('reconcile')} forgotten={forgotten}/>}
        {tab === 'history'   && <HistoryTab exps={mExp} onDelete={id => setExpenses(p => p.filter(e => e.id !== id))} onAdd={() => setShowOCR(true)}/>}
        {tab === 'reconcile' && <ReconcileTab expenses={expenses} setExpenses={setExpenses} cbTxs={cbTxs} setCbTxs={setCbTxs}/>}
        {tab === 'settings'  && <SettingsTab rates={rates} setRates={setRates}/>}
      </div>

      {/* FAB */}
      {(tab === 'home' || tab === 'history') && (
        <button className="btn" onClick={() => setShowOCR(true)}
          style={{position:'fixed', bottom:88, right:18, width:54, height:54, borderRadius:'50%', padding:0, fontSize:24, boxShadow:'0 4px 18px rgba(45,91,227,0.45)', zIndex:50}}>
          +
        </button>
      )}

      {/* BOTTOM NAV */}
      <nav style={{position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:540, background:'#fff', borderTop:'0.5px solid var(--bdr)', display:'grid', gridTemplateColumns:'repeat(4,1fr)', zIndex:100, boxShadow:'0 -1px 10px rgba(0,0,0,0.05)'}}>
        {TABS.map(([id, ico, label]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{padding:'10px 4px 11px', border:'none', background:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, color: tab===id ? 'var(--acc)' : 'var(--t3)', position:'relative'}}>
            <span style={{fontSize:19}}>{ico}</span>
            <span style={{fontSize:10, fontWeight: tab===id ? 600 : 400}}>{label}</span>
            {id === 'reconcile' && forgotten > 0 && (
              <span style={{position:'absolute', top:8, right:'calc(50% - 13px)', width:7, height:7, background:'var(--red)', borderRadius:'50%'}}/>
            )}
          </button>
        ))}
      </nav>

      {/* MODALS */}
      {showOCR    && <OCRModal    onClose={() => setShowOCR(false)}    onAdd={addExp} rates={rates} month={month}/>}
      {showExport && <ExportModal onClose={() => setShowExport(false)} exps={mExp}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
