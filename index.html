/* UBS PARSER */
function parseUBS(raw){
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
  let hi=0;
  for(let i=0;i<Math.min(10,lines.length);i++){
    const l=lines[i].toLowerCase();
    if(l.includes('datum')||l.includes('buchungstext')||l.includes('libellé')||l.includes('amount')||l.includes('montant')){hi=i;break;}
  }
  const hh=spl(lines[hi]).map(h=>h.toLowerCase().trim());
  const col={date:fc(hh,['datum','date']),label:fc(hh,['buchungstext','libellé','description','text']),amount:fc(hh,['betrag','montant','amount']),currency:fc(hh,['währung','devise','currency'])};
  const rows=[];
  for(let i=hi+1;i<lines.length;i++){
    const c=spl(lines[i]);if(c.length<3)continue;
    const date=pd(c[col.date]??'');const amount=pn(c[col.amount]??'');
    if(!date||isNaN(amount))continue;
    rows.push({date,label:(c[col.label]??'').trim(),amount,currency:(c[col.currency]??'CHF').trim()||'CHF'});
  }
  let info='';
  if(hi>0)info=lines.slice(0,hi).map(l=>spl(l).join(' ').trim()).filter(l=>l.length>2).join(' · ');
  return{rows,info};
}
function fc(h,c){for(const x of c){const i=h.findIndex(k=>k.includes(x));if(i>=0)return i;}return -1;}
function spl(line){const r=[];let cur='',q=false;for(const ch of line){if(ch==='"'){q=!q;continue;}if(ch===';'&&!q){r.push(cur);cur='';continue;}cur+=ch;}r.push(cur);return r;}
function pd(s){s=s.trim();const m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;return null;}
function pn(s){s=s.trim().replace(/'/g,'').replace(/\s/g,'');if(!s||s==='-')return NaN;return parseFloat(s);}
function normLabel(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}
function tokenizeLabel(s){return normLabel(s).split(' ').filter(t=>t.length>=3);}
function labelsClose(a,b){
  const ta=tokenizeLabel(a),tb=tokenizeLabel(b);
  if(ta.length===0||tb.length===0)return false;
  const sa=new Set(ta),sb=new Set(tb);
  let common=0;
  for(const t of sa){if(sb.has(t))common++;}
  if(common>=2)return true;
  if(common===1){
    const strong=['uber','sbb','cff','ibis','restaurant','brasserie','netflix','coop','migros','amazon','easyjet','manor'];
    return [...sa].some(t=>sb.has(t)&&strong.includes(t));
  }
  const joinedA=ta.join(' '),joinedB=tb.join(' ');
  return joinedA.includes(joinedB)||joinedB.includes(joinedA);
}
function labelScore(a,b){
  const ta=tokenizeLabel(a),tb=tokenizeLabel(b);
  if(ta.length===0||tb.length===0)return 0;
  const sa=new Set(ta),sb=new Set(tb);
  let common=0;
  for(const t of sa){if(sb.has(t))common++;}
  const base=common/Math.max(sa.size,sb.size);
  const joinedA=ta.join(' '),joinedB=tb.join(' ');
  if(joinedA===joinedB)return 1;
  if(joinedA.includes(joinedB)||joinedB.includes(joinedA))return Math.max(base,0.9);
  return base;
}

/* RECONCILIATION */
function reconcile(expenses,ubsRows){
  const matched=new Set();
  const updated=expenses.map(exp=>{
    const ea=Math.abs(exp.amountCHF||exp.amount),ed=new Date(exp.date);
    let bestIdx=-1,bestScore=-1,bestRow=null;
    for(let i=0;i<ubsRows.length;i++){
      if(matched.has(i))continue;
      const r=ubsRows[i];if(r.amount>=0)continue;
      const ra=Math.abs(r.amount),dd=Math.abs((ed-new Date(r.date))/86400000),ap=ra>0?Math.abs(ea-ra)/ra:1;
      if(dd<=2&&ap<=0.05&&labelsClose(exp.merchant,r.label)){
        const score=(labelScore(exp.merchant,r.label)*1000)-dd*10-ap*100;
        if(score>bestScore){bestScore=score;bestIdx=i;bestRow=r;}
      }
    }
    if(bestIdx>=0){matched.add(bestIdx);return{...exp,status:'reconciled',ubsRow:bestRow,amtDiff:Math.abs(ea-Math.abs(bestRow.amount))>0.005?Math.abs(bestRow.amount)-ea:0};}
    return {...exp,status:'pending',ubsRow:null,amtDiff:0};
  });
  return{expenses:updated,forgotten:ubsRows.filter((r,i)=>!matched.has(i)&&r.amount<0)};
}

function AddModal({onClose,onAdd,month}){

  const [uploading,setUploading]=useState(false);
  const [ocrStatus,setOcrStatus]=useState(null);
  const [ocrProgress,setOcrProgress]=useState(0);
  const [err,setErr]=useState('');
  const fRef=useRef();

  const runOCR=async(imgFile)=>{
    if(!imgFile.type.startsWith('image/'))return;
    setOcrStatus('scanning');setOcrProgress(0);
    try{
      if(!window.Tesseract){
        await new Promise((resolve,reject)=>{
          const s=document.createElement('script');
          s.src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
          s.onload=resolve;s.onerror=reject;
          document.head.appendChild(s);
        });
      }
      const result=await window.Tesseract.recognize(imgFile,'fra+eng',{logger:m=>{if(m.status==='recognizing text')setOcrProgress(Math.round(m.progress*100));}});
      const text=result.data.text;
      const amounts=[];
      const amtRegex=/(\d{1,4}[.,]\d{2})/g;
      let m;while((m=amtRegex.exec(text))!==null){const v=parseFloat(m[1].replace(',','.'));if(!isNaN(v)&&v>0)amounts.push(v);}
      const maxAmt=amounts.length>0?Math.max(...amounts):null;
      const tvaMatch=text.match(/TVA[:\s]*(\d+[.,]\d{2})/i);
      const dateMatch=text.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
      let extractedDate=null;
      if(dateMatch){
        const d=dateMatch[1].padStart(2,'0'),mo=dateMatch[2].padStart(2,'0');
        let y=dateMatch[3];if(y.length===2)y='20'+y;
        extractedDate=`${y}-${mo}-${d}`;
        const dt=new Date(extractedDate);
        if(isNaN(dt.getTime())||dt.getFullYear()<2020)extractedDate=null;
      }
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>3&&!/^\d+$/.test(l));
      const merchant=lines[0]?.substring(0,50)||'';
      setForm(f=>({...f,merchant:merchant||f.merchant,amount:maxAmt?maxAmt.toFixed(2):f.amount,tva:tvaMatch?parseFloat(tvaMatch[1].replace(',','.')).toFixed(2):f.tva,date:extractedDate||f.date}));
      setOcrStatus('done');
    }catch(e){console.error('OCR error:',e);setOcrStatus('error');}
  };

  const handleFile=f=>{
    if(!f)return;
    setFile(f);
    if(f.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=e=>{setPreview(e.target.result);runOCR(f);};
      r.readAsDataURL(f);
    }else{setPreview('pdf');}
  };

  const confirm=async()=>{
    if(!form.merchant){setErr('Le commerçant est obligatoire');return;}

    </div>
  );

function App(){
  const [tab,setTab]=useState('home');
  const [expenses,setExpenses]=useState([]);
  const [forgotten,setForgotten]=useState([]);
  const [ubsLoaded,setUbsLoaded]=useState(false);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [showUBS,setShowUBS]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const [notif,setNotif]=useState(null);
  const [filterCat,setFilterCat]=useState('all');
  const [dbError,setDbError]=useState(null);
  const [month,setMonth]=useState('2026-03');
  const [viewer,setViewer]=useState(null);
  const [viewportWidth,setViewportWidth]=useState(typeof window!=='undefined'?window.innerWidth:1280);

  const notify=(msg,dur=4000)=>{setNotif(msg);setTimeout(()=>setNotif(null),dur);};
  const loadData=useCallback(async()=>{setLoading(true);setDbError(null);try{const d=await fetchExpenses(month);setExpenses(d);}catch(e){setDbError(e.message);}finally{setLoading(false);}},[month]);
  useEffect(()=>{loadData();},[loadData]);
  useEffect(()=>{const onResize=()=>setViewportWidth(window.innerWidth);onResize();window.addEventListener('resize',onResize);return()=>window.removeEventListener('resize',onResize);},[]);

  const addExpense=useCallback(async(e)=>{setSyncing(true);try{const s=await insertExpense(e);setExpenses(p=>[s,...p]);notify('✅ Frais enregistré !');}catch(e){notify('❌ '+e.message);}finally{setSyncing(false);}},[]);
  const deleteExpense=useCallback(async(id,receiptUrl)=>{try{await deleteById(id,receiptUrl);setExpenses(p=>p.filter(e=>e.id!==id));notify('🗑 Frais supprimé');}catch(e){notify('❌ Erreur: '+e.message);}},[]);
  const handleUBS=useCallback(async(rows)=>{
    setSyncing(true);
    const mr=rows.filter(r=>r.date.startsWith(month));
    const monthExpenses=expenses.filter(e=>e.date?.startsWith(month));
    const otherExpenses=expenses.filter(e=>!e.date?.startsWith(month));
    const resetMonthExpenses=monthExpenses.map(e=>({...e,status:'pending',ubsRow:null,amtDiff:0}));
    const{expenses:recMonth,forgotten:forg}=reconcile(resetMonthExpenses,mr);
    const changed=recMonth.filter(n=>{const prev=monthExpenses.find(e=>e.id===n.id);if(!prev)return false;const prevLabel=prev.ubsRow?.label||'';const nextLabel=n.ubsRow?.label||'';const prevDate=prev.ubsRow?.date||null;const nextDate=n.ubsRow?.date||null;const prevDiff=Number(prev.amtDiff||0);const nextDiff=Number(n.amtDiff||0);return prev.status!==n.status||prevLabel!==nextLabel||prevDate!==nextDate||Math.abs(prevDiff-nextDiff)>0.005;});
    await Promise.all(changed.map(e=>updateStatus(e.id,e.status,e.ubsRow?.label||'',e.ubsRow?.date||null,e.amtDiff||0)));
    const rec=[...otherExpenses,...recMonth].sort((a,b)=>new Date(b.date)-new Date(a.date));
    setExpenses(rec);setForgotten(forg);setUbsLoaded(true);setSyncing(false);

    setTab('recon');
  },[expenses,month]);
  const addForgotten=useCallback(async(cb)=>{await addExpense({date:cb.date,merchant:cb.label,amount:Math.abs(cb.amount),tva:0,category:'autre',currency:'CHF',amountCHF:Math.abs(cb.amount),status:'pending',note:'⚠ Importé depuis UBS'});setForgotten(p=>p.filter(f=>f!==cb));},[addExpense]);

  const monthCounts=useMemo(()=>expenses.reduce((acc,e)=>{if(e.date){const key=e.date.slice(0,7);acc[key]=(acc[key]||0)+1;}return acc;},{}),[expenses]);
  const mE=useMemo(()=>expenses.filter(e=>e.date?.startsWith(month)),[expenses,month]);
  const fil=useMemo(()=>mE.filter(e=>filterCat==='all'||e.category===filterCat),[mE,filterCat]);
  const rec=mE.filter(e=>e.status==='reconciled');
  const pend=mE.filter(e=>e.status==='pending');
  const mT=tot(mE);
  const tva=mE.reduce((s,e)=>s+Number(e.tva||0),0);
  const pct=mE.length>0?Math.round(rec.length/mE.length*100):0;
  const bycat=CATS.map(c=>({...c,t:mE.filter(e=>e.category===c.id).reduce((s,e)=>s+Number(e.amountCHF||0),0)})).filter(c=>c.t>0);
  const isMobile=viewportWidth<860;

  if(loading)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',gap:16,background:'var(--bg)',padding:20}}><div style={{fontSize:48}}>🏦</div><div style={{fontWeight:600,fontSize:16}}>Connexion à Supabase…</div><div style={{fontSize:13,color:'var(--t3)'}}>Chargement des frais de Mike</div></div>);

        <div style={{padding:isMobile?'16px 16px 12px':'24px 20px 16px'}}><div style={{fontSize:10,color:'var(--t3)',letterSpacing:'0.1em',marginBottom:4}}>NOTES DE FRAIS</div><div style={{fontSize:18,fontWeight:700}}>Mike</div><div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}><span style={{width:7,height:7,borderRadius:'50%',background:dbError?'var(--red)':'var(--green)',display:'inline-block'}}/><span style={{fontSize:11,color:dbError?'var(--red)':'var(--green)'}}>{dbError?'Erreur connexion':'Supabase connecté'}</span></div></div>
        <div style={{padding:isMobile?'0 12px 10px':'0 12px 12px'}}><div style={{fontSize:10,color:'var(--t3)',letterSpacing:'0.08em',padding:'0 8px',marginBottom:6}}>PÉRIODE</div><div style={{display:'flex',flexDirection:isMobile?'row':'column',gap:isMobile?8:0,overflowX:isMobile?'auto':'visible',paddingBottom:isMobile?4:0,WebkitOverflowScrolling:'touch'}}>{MONTHS.map(m=><button key={m.v} onClick={()=>setMonth(m.v)} style={{width:isMobile?'auto':'100%',minWidth:isMobile?132:'auto',textAlign:'left',padding:'7px 12px',borderRadius:8,border:'none',background:month===m.v?'var(--al)':'none',color:month===m.v?'var(--accent)':'var(--t2)',fontSize:13,fontWeight:month===m.v?500:400,cursor:'pointer',marginBottom:isMobile?0:2,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexShrink:0}}><span>{m.l}</span>{monthCounts[m.v]>0&&<span style={{minWidth:20,height:20,padding:'0 6px',borderRadius:999,background:month===m.v?'rgba(26,63,181,0.12)':'var(--s2)',color:month===m.v?'var(--accent)':'var(--t3)',fontSize:11,fontWeight:600,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{monthCounts[m.v]}</span>}</button>)}</div></div>
        <div style={{height:'0.5px',background:'var(--border)',margin:'0 16px'}}/>

        {tab==='home'&&<div style={{maxWidth:isMobile?'100%':720}}><div style={{marginBottom:24}}><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{ML}</h1><div style={{fontSize:13,color:'var(--t3)'}}>Tableau de bord des frais professionnels</div></div><div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(4,1fr)',gap:12,marginBottom:24}}>{[{l:'Total',v:`CHF ${fmt(mT)}`,s:`${mE.length} frais`},{l:'TVA',v:`CHF ${fmt(tva)}`,s:'récupérable'},{l:'Réconciliés',v:`${rec.length}/${mE.length}`,s:`${pct}%`},{l:'Oubliés',v:forgotten.length,s:forgotten.length>0?'à régulariser':'aucun ✓'}].map((k,i)=><div key={i} style={{background:'#fff',borderRadius:12,padding:'16px 18px',border:'0.5px solid var(--border)'}}><div style={{fontSize:10,color:'var(--t3)',marginBottom:6,letterSpacing:'0.03em'}}>{k.l.toUpperCase()}</div><div style={{fontSize:20,fontWeight:700,fontFamily:'DM Mono',color:i===3&&forgotten.length>0?'var(--red)':'var(--text)'}}>{k.v}</div><div style={{fontSize:11,color:'var(--t3)',marginTop:3}}>{k.s}</div></div>)}</div><div style={{background:'#1A3FB5',borderRadius:14,padding:20,color:'#fff',marginBottom:20}}><div style={{display:'flex',justifyContent:'space-between',flexDirection:isMobile?'column':'row',gap:isMobile?12:0,marginBottom:16}}><div><div style={{fontSize:11,opacity:0.65,letterSpacing:'0.08em',marginBottom:4}}>RÉCONCILIATION UBS</div><div style={{fontSize:28,fontWeight:700,fontFamily:'DM Mono'}}>{pct}%</div></div><div style={{textAlign:isMobile?'left':'right',fontSize:12,opacity:0.8}}><div>{rec.length} réconciliés</div><div>{pend.length} en attente</div></div></div><div style={{height:6,background:'rgba(255,255,255,0.2)',borderRadius:99}}><div style={{width:`${pct}%`,height:'100%',background:pct===100?'#7CEFA0':'#FBD761',borderRadius:99,transition:'width 0.6s'}}/></div></div>{bycat.length>0&&<div style={{background:'#fff',borderRadius:12,padding:20,border:'0.5px solid var(--border)',marginBottom:20}}><div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Répartition par catégorie</div>{bycat.sort((a,b)=>b.t-a.t).map(c=>{const p=mT>0?Math.round(c.t/mT*100):0;return(<div key={c.id} style={{marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}><span style={{fontWeight:500}}>{c.icon} {c.label}</span><span style={{fontFamily:'DM Mono',fontWeight:600}}>CHF {fmt(c.t)} <span style={{color:'var(--t3)',fontWeight:400,fontSize:11}}>({p}%)</span></span></div><div style={{height:6,background:'var(--s2)',borderRadius:99}}><div style={{width:`${p}%`,height:'100%',background:'var(--accent)',borderRadius:99}}/></div></div>);})}</div>}<button onClick={()=>{setSubmitted(true);notify('📧 Frais soumis au service RH !');setTimeout(()=>setSubmitted(false),3000);}} style={{...bP,width:isMobile?'100%':'auto',justifyContent:'center',padding:'14px 24px',background:submitted?'var(--green)':'var(--accent)',transition:'background 0.3s',fontSize:14}}>{submitted?'✓ Frais soumis !':'📤 Soumettre les frais du mois'}</button></div>}

        {tab==='history'&&<div style={{maxWidth:isMobile?'100%':800}}><div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Historique</h1><div style={{fontSize:13,color:'var(--t3)'}}>{ML} · {fil.length} frais · {fil.filter(e=>e.receiptUrl).length} avec justificatif</div></div><div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>{[{id:'all',label:'Tous',icon:''},...CATS].map(c=><button key={c.id} onClick={()=>setFilterCat(c.id)} style={{padding:'6px 14px',borderRadius:20,fontSize:12,cursor:'pointer',border:filterCat===c.id?'2px solid var(--accent)':'0.5px solid var(--border)',background:filterCat===c.id?'var(--al)':'#fff',color:filterCat===c.id?'var(--accent)':'var(--t2)',fontWeight:filterCat===c.id?500:400}}>{c.icon?`${c.icon} ${c.label}`:c.label}</button>)}</div>{fil.length===0?<div style={{textAlign:'center',padding:'60px 20px',color:'var(--t3)'}}><div style={{fontSize:48,marginBottom:12}}>📝</div><div style={{fontWeight:500,fontSize:16,marginBottom:4}}>Aucun frais pour ce mois</div><button onClick={()=>setShowAdd(true)} style={{...bP,display:'inline-flex',marginTop:12}}>+ Ajouter un frais</button></div>:<div style={{background:'#fff',borderRadius:12,border:'0.5px solid var(--border)',overflow:'hidden'}}>{fil.map((e,i)=><div key={e.id} style={{display:'flex',gap:14,alignItems:isMobile?'stretch':'center',flexDirection:isMobile?'column':'row',padding:'14px 18px',borderBottom:i<fil.length-1?'0.5px solid var(--border)':'none'}}><div style={{width:44,height:44,borderRadius:10,background:CMAP[e.category]?.color||'#eee',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{CMAP[e.category]?.icon||'📎'}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.merchant}</div><div style={{fontSize:12,color:'var(--t3)',marginTop:3,display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}><span>{fd(e.date)}</span><Badge status={e.status}/>{e.note&&<span>· {e.note}</span>}</div>{e.ubsRow&&<div style={{fontSize:11,color:'var(--green)',marginTop:3}}>↳ UBS: {e.ubsRow.label}</div>}</div><Thumb url={e.receiptUrl} name={e.receiptName||'justificatif'} onView={e.receiptUrl?()=>setViewer({url:e.receiptUrl,name:e.receiptName||'justificatif'}):null}/><div style={{textAlign:isMobile?'left':'right',flexShrink:0,minWidth:isMobile?'100%':90,width:isMobile?'100%':'auto'}}><div style={{fontWeight:700,fontFamily:'DM Mono',fontSize:15}}>CHF {fmt(e.amountCHF||e.amount)}</div>{e.tva>0&&<div style={{fontSize:11,color:'var(--t3)'}}>TVA {fmt(e.tva)}</div>}<div style={{display:'flex',gap:8,justifyContent:isMobile?'flex-start':'flex-end',marginTop:4,alignItems:'center'}}>{e.receiptUrl&&<a href={e.receiptUrl} download={e.receiptName||'justificatif'} title="Télécharger le justificatif" style={{color:'var(--accent)',fontSize:15,textDecoration:'none',padding:2,lineHeight:1}} onClick={ev=>ev.stopPropagation()}>⬇</a>}<button onClick={()=>deleteExpense(e.id,e.receiptUrl)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',fontSize:14,padding:2}} title="Supprimer">🗑</button></div></div></div>)}</div>}</div>}

        {tab==='recon'&&<div style={{maxWidth:isMobile?'100%':680}}><div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Relevé UBS</h1><div style={{fontSize:13,color:'var(--t3)'}}>Réconciliation automatique</div></div>{!ubsLoaded?<div style={{textAlign:'center',padding:'60px 20px',background:'#fff',borderRadius:12,border:'0.5px solid var(--border)'}}><div style={{fontSize:56,marginBottom:16}}>🏦</div><div style={{fontWeight:600,fontSize:17,marginBottom:8}}>Aucun relevé UBS importé</div><div style={{fontSize:13,color:'var(--t3)',marginBottom:24,lineHeight:1.7}}>Importez votre CSV UBS e-banking pour réconcilier automatiquement</div><button onClick={()=>setShowUBS(true)} style={{...bP,fontSize:14,padding:'12px 24px'}}>🏦 Importer relevé UBS</button></div>:<><div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:12,marginBottom:20}}>{[{l:'Réconciliés',v:rec.length,bg:'var(--gl)',c:'var(--green)'},{l:'En attente',v:pend.length,bg:'var(--aml)',c:'var(--amber)'},{l:'Oubliés',v:forgotten.length,bg:'var(--rl)',c:'var(--red)'}].map(s=><div key={s.l} style={{background:s.bg,borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:28,fontWeight:700,fontFamily:'DM Mono',color:s.c}}>{s.v}</div><div style={{fontSize:12,color:s.c,marginTop:4}}>{s.l}</div></div>)}</div>{rec.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:600,color:'var(--green)',marginBottom:10}}>✅ Réconciliés avec UBS</div><div style={{background:'#fff',borderRadius:12,border:'0.5px solid var(--border)',overflow:'hidden'}}>{rec.map((e,i)=><div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'stretch':'center',flexDirection:isMobile?'column':'row',padding:'12px 18px',borderBottom:i<rec.length-1?'0.5px solid var(--border)':'none',gap:12}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500}}>{e.merchant}</div><div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{fd(e.date)}</div>{e.ubsRow&&<div style={{fontSize:11,color:'var(--green)',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>↳ {e.ubsRow.label}</div>}</div><Thumb url={e.receiptUrl} name={e.receiptName} onView={e.receiptUrl?()=>setViewer({url:e.receiptUrl,name:e.receiptName||'justificatif'}):null}/><div style={{textAlign:isMobile?'left':'right',flexShrink:0,width:isMobile?'100%':'auto'}}><div style={{fontFamily:'DM Mono',fontWeight:700}}>CHF {fmt(e.amountCHF||e.amount)}</div>{e.amtDiff&&Math.abs(e.amtDiff)>0.005?<div style={{fontSize:11,color:'var(--amber)'}}>Écart {fmt(e.amtDiff)}</div>:null}</div></div>)}</div></div>}{forgotten.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:600,color:'var(--red)',marginBottom:10}}>⚠ Dans UBS — sans justificatif</div><div style={{display:'grid',gap:8}}>{forgotten.map((f,i)=><div key={i} style={{background:'var(--rl)',borderRadius:10,padding:'12px 16px',border:'0.5px solid #F7C1C1',display:'flex',justifyContent:'space-between',flexDirection:isMobile?'column':'row',alignItems:isMobile?'stretch':'center',gap:isMobile?10:0}}><div><div style={{fontWeight:500,color:'#791F1F'}}>{f.label}</div><div style={{fontSize:11,color:'#A32D2D',marginTop:2}}>{fd(f.date)}</div></div><div style={{display:'flex',gap:10,alignItems:'center',justifyContent:isMobile?'space-between':'flex-end'}}><span style={{fontFamily:'DM Mono',fontWeight:700,color:'var(--red)'}}>CHF {fmt(Math.abs(f.amount))}</span><button onClick={()=>addForgotten(f)} style={{...bS,padding:'6px 12px',fontSize:12,color:'var(--red)',borderColor:'#F09595'}}>+ Créer</button></div></div>)}</div></div>}{pend.length>0&&<div><div style={{fontSize:12,fontWeight:600,color:'var(--amber)',marginBottom:10}}>⏳ Saisis — non trouvés dans UBS</div><div style={{background:'#fff',borderRadius:12,border:'0.5px solid var(--border)',overflow:'hidden'}}>{pend.map((e,i)=><div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:isMobile?'stretch':'center',flexDirection:isMobile?'column':'row',padding:'12px 18px',borderBottom:i<pend.length-1?'0.5px solid var(--border)':'none',gap:12}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500}}>{e.merchant}</div><div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{fd(e.date)}</div></div><Thumb url={e.receiptUrl} name={e.receiptName} onView={e.receiptUrl?()=>setViewer({url:e.receiptUrl,name:e.receiptName||'justificatif'}):null}/><span style={{fontFamily:'DM Mono',fontWeight:700,color:'var(--amber)',flexShrink:0,alignSelf:isMobile?'flex-start':'auto'}}>CHF {fmt(e.amountCHF||e.amount)}</span></div>)}</div></div>}<button onClick={()=>setShowUBS(true)} style={{...bS,marginTop:16}}>🔄 Importer un nouveau relevé UBS</button></>}</div>}

        {tab==='stats'&&<StatsTab expenses={expenses} month={month} months={MONTHS}/>}
      </div>

      {showUBS&&<UBSModal onClose={()=>setShowUBS(false)} onImport={handleUBS}/>}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addExpense} month={month}/>}
    </div>
  );
}

ReactDOM.render(<React.StrictMode><App/></React.StrictMode>,document.getElementById('root'));
</script>
</body>
</html>
