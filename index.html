<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NotesFrais</title>
<style>
html,body{height:100%;margin:0}
body{font-family:system-ui,sans-serif;background:#F5F3EF;color:#1A1A1A;display:flex;align-items:center;justify-content:center}
#status{font-size:14px;color:#6B6560}
</style>
</head>
<body>
<div id="status">Chargement de NotesFrais…</div>
<script>
(async function () {
  const sourceUrl = 'https://raw.githubusercontent.com/NumeriqAG/notesfrais/main/app.html';
  const broken = "        </div>}\n      </div>\n\n        {tab==='stats'&&<StatsTab expenses={expenses} month={month} months={MONTHS}/>}\n      </div>\n\n      {showUBS&&<UBSModal onClose={()=>setShowUBS(false)} onImport={handleUBS}/>}\n      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addExpense} month={month}/>}\n    </div>";
  const fixed = "        </div>}\n\n        {tab==='stats'&&<StatsTab expenses={expenses} month={month} months={MONTHS}/>}\n      </div>\n\n      {showUBS&&<UBSModal onClose={()=>setShowUBS(false)} onImport={handleUBS}/>}\n      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addExpense} month={month}/>}\n    </div>";
  const replacements = [
    ["  // Default = today if in selected month, else 1st of month\n  const todayISO=new Date().toISOString().split('T')[0];\n  const defaultDate=todayISO.startsWith(month)?todayISO:`${month}-01`;","  // Default to today's date whenever a new expense is added.\n  const todayISO=new Date().toISOString().split('T')[0];\n  const defaultDate=todayISO;"],
    ["function pn(s){s=s.trim().replace(/'/g,'').replace(/\\s/g,'');if(!s||s==='-')return NaN;return parseFloat(s);}\n\n/* ── RECONCILIATION ── */","function pn(s){s=s.trim().replace(/'/g,'').replace(/\\s/g,'');if(!s||s==='-')return NaN;return parseFloat(s);}\nfunction normLabel(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}\nfunction tokenizeLabel(s){return normLabel(s).split(' ').filter(t=>t.length>=3);}\nfunction labelsClose(a,b){const ta=tokenizeLabel(a),tb=tokenizeLabel(b);if(ta.length===0||tb.length===0)return false;const sa=new Set(ta),sb=new Set(tb);let common=0;for(const t of sa){if(sb.has(t))common++;}if(common>=2)return true;if(common===1){const strong=['uber','sbb','cff','ibis','restaurant','brasserie','netflix','coop','migros','amazon','easyjet','manor'];return [...sa].some(t=>sb.has(t)&&strong.includes(t));}const joinedA=ta.join(' '),joinedB=tb.join(' ');return joinedA.includes(joinedB)||joinedB.includes(joinedA);}\nfunction labelScore(a,b){const ta=tokenizeLabel(a),tb=tokenizeLabel(b);if(ta.length===0||tb.length===0)return 0;const sa=new Set(ta),sb=new Set(tb);let common=0;for(const t of sa){if(sb.has(t))common++;}const base=common/Math.max(sa.size,sb.size);const joinedA=ta.join(' '),joinedB=tb.join(' ');if(joinedA===joinedB)return 1;if(joinedA.includes(joinedB)||joinedB.includes(joinedA))return Math.max(base,0.9);return base;}\n\n/* ── RECONCILIATION ── */"],
    ["    if(exp.status==='reconciled')return exp;\n",""],
    ["      if(dd<=2&&ap<=0.05){matched.add(i);return{...exp,status:'reconciled',ubsRow:r,amtDiff:Math.abs(ea-ra)>0.005?ra-ea:0};}","      if(dd<=2&&ap<=0.05&&labelsClose(exp.merchant,r.label)){matched.add(i);return{...exp,status:'reconciled',ubsRow:r,amtDiff:Math.abs(ea-ra)>0.005?ra-ea:0};}"],
    ["    return exp;","    return {...exp,status:'pending',ubsRow:null,amtDiff:0};"],
    ["    const mr=rows.filter(r=>r.date.startsWith(month));\n    const{expenses:rec,forgotten:forg}=reconcile(expenses,mr);\n    const toUp=rec.filter(r=>r.status==='reconciled'&&expenses.find(e=>e.id===r.id&&e.status!=='reconciled'));\n    await Promise.all(toUp.map(e=>updateStatus(e.id,'reconciled',e.ubsRow?.label||'',e.ubsRow?.date||null,e.amtDiff||0)));\n    setExpenses(rec);setForgotten(forg);setUbsLoaded(true);setSyncing(false);","    const mr=rows.filter(r=>r.date.startsWith(month));\n    const monthExpenses=expenses.filter(e=>e.date?.startsWith(month));\n    const otherExpenses=expenses.filter(e=>!e.date?.startsWith(month));\n    const resetMonthExpenses=monthExpenses.map(e=>({...e,status:'pending',ubsRow:null,amtDiff:0}));\n    const{expenses:recMonth,forgotten:forg}=reconcile(resetMonthExpenses,mr);\n    const changed=recMonth.filter(n=>{\n      const prev=monthExpenses.find(e=>e.id===n.id);\n      if(!prev)return false;\n      const prevLabel=prev.ubsRow?.label||'';\n      const nextLabel=n.ubsRow?.label||'';\n      const prevDate=prev.ubsRow?.date||null;\n      const nextDate=n.ubsRow?.date||null;\n      const prevDiff=Number(prev.amtDiff||0);\n      const nextDiff=Number(n.amtDiff||0);\n      return prev.status!==n.status||prevLabel!==nextLabel||prevDate!==nextDate||Math.abs(prevDiff-nextDiff)>0.005;\n    });\n    await Promise.all(changed.map(e=>updateStatus(e.id,e.status,e.ubsRow?.label||'',e.ubsRow?.date||null,e.amtDiff||0)));\n    const rec=[...otherExpenses,...recMonth].sort((a,b)=>new Date(b.date)-new Date(a.date));\n    setExpenses(rec);setForgotten(forg);setUbsLoaded(true);setSyncing(false);"],
    ["    const ea=Math.abs(exp.amountCHF||exp.amount),ed=new Date(exp.date);\n    for(let i=0;i<ubsRows.length;i++){","    const ea=Math.abs(exp.amountCHF||exp.amount),ed=new Date(exp.date);\n    let bestIdx=-1,bestScore=-1,bestRow=null;\n    for(let i=0;i<ubsRows.length;i++){"],
    ["      if(dd<=2&&ap<=0.05&&labelsClose(exp.merchant,r.label)){matched.add(i);return{...exp,status:'reconciled',ubsRow:r,amtDiff:Math.abs(ea-ra)>0.005?ra-ea:0};}","      if(dd<=2&&ap<=0.05&&labelsClose(exp.merchant,r.label)){\n        const score=(labelScore(exp.merchant,r.label)*1000)-dd*10-ap*100;\n        if(score>bestScore){bestScore=score;bestIdx=i;bestRow=r;}\n      }"],
    ["    return {...exp,status:'pending',ubsRow:null,amtDiff:0};","    if(bestIdx>=0){matched.add(bestIdx);return{...exp,status:'reconciled',ubsRow:bestRow,amtDiff:Math.abs(ea-Math.abs(bestRow.amount))>0.005?Math.abs(bestRow.amount)-ea:0};}\n    return {...exp,status:'pending',ubsRow:null,amtDiff:0};"],
    ["    notify(`✅ ${n} réconciliés — ${forg.length} oubli${forg.length>1?'s':''} détecté${forg.length>1?'s':''}`);","    notify('✅ Relevé UBS importé');"],
    ["  const mE=useMemo(()=>expenses.filter(e=>e.date?.startsWith(month)),[expenses,month]);","  const monthCounts=useMemo(()=>expenses.reduce((acc,e)=>{\n    if(e.date){\n      const key=e.date.slice(0,7);\n      acc[key]=(acc[key]||0)+1;\n    }\n    return acc;\n  },{}),[expenses]);\n  const mE=useMemo(()=>expenses.filter(e=>e.date?.startsWith(month)),[expenses,month]);"],
    ["          {MONTHS.map(m=>(\n            <button key={m.v} onClick={()=>setMonth(m.v)} style={{width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:8,border:'none',background:month===m.v?'var(--al)':'none',color:month===m.v?'var(--accent)':'var(--t2)',fontSize:13,fontWeight:month===m.v?500:400,cursor:'pointer',marginBottom:2}}>\n              {m.l}\n            </button>\n          ))}","          {MONTHS.map(m=>(\n            <button key={m.v} onClick={()=>setMonth(m.v)} style={{width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:8,border:'none',background:month===m.v?'var(--al)':'none',color:month===m.v?'var(--accent)':'var(--t2)',fontSize:13,fontWeight:month===m.v?500:400,cursor:'pointer',marginBottom:2,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>\n              <span>{m.l}</span>\n              {monthCounts[m.v]>0&&<span style={{minWidth:20,height:20,padding:'0 6px',borderRadius:999,background:month===m.v?'rgba(26,63,181,0.12)':'var(--s2)',color:month===m.v?'var(--accent)':'var(--t3)',fontSize:11,fontWeight:600,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{monthCounts[m.v]}</span>}\n            </button>\n          ))}"],
    ["          {[['home','🏠','Accueil',0],['history','📋','Historique',0],['stats','📊','Statistiques',0],['recon','🏦','Relevé UBS',forgotten.length]].map(([id,ic,lb,badge])=>(\n            <button key={id} onClick={()=>setTab(id)} style={{width:'100%',textAlign:'left',padding:'8px 12px',borderRadius:8,border:'none',background:tab===id?'var(--al)':'none',color:tab===id?'var(--accent)':'var(--t2)',fontSize:13,fontWeight:tab===id?500:400,cursor:'pointer',marginBottom:2,display:'flex',justifyContent:'space-between',alignItems:'center'}}>\n              <span>{ic} {lb}</span>\n              {badge>0&&<span style={{background:'var(--red)',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:10}}>{badge}</span>}\n            </button>\n          ))}","          {[['home','🏠','Accueil'],['history','📋','Historique'],['stats','📊','Statistiques'],['recon','🏦','Relevé UBS']].map(([id,ic,lb])=>(\n            <button key={id} onClick={()=>setTab(id)} style={{width:'100%',textAlign:'left',padding:'8px 12px',borderRadius:8,border:'none',background:tab===id?'var(--al)':'none',color:tab===id?'var(--accent)':'var(--t2)',fontSize:13,fontWeight:tab===id?500:400,cursor:'pointer',marginBottom:2,display:'flex',justifyContent:'space-between',alignItems:'center'}}>\n              <span>{ic} {lb}</span>\n            </button>\n          ))}"],
    ["          {forgotten.length>0&&<div style={{background:'var(--rl)',borderRadius:12,padding:16,border:'1px solid #F7C1C1',marginBottom:20}}>\n            <div style={{fontWeight:600,fontSize:14,color:'var(--red)',marginBottom:10}}>⚠ {forgotten.length} frais UBS sans justificatif</div>\n            {forgotten.map((f,i)=>(\n              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderTop:'0.5px solid #F7C1C1'}}>\n                <div><div style={{fontWeight:500,color:'#791F1F'}}>{f.label}</div><div style={{fontSize:11,color:'#A32D2D'}}>{fd(f.date)}</div></div>\n                <div style={{display:'flex',gap:8,alignItems:'center'}}>\n                  <span style={{fontFamily:'DM Mono',color:'var(--red)',fontWeight:600}}>CHF {fmt(Math.abs(f.amount))}</span>\n                  <button onClick={()=>addForgotten(f)} style={{...bS,padding:'5px 10px',fontSize:12,color:'var(--red)',borderColor:'#F09595'}}>+ Créer</button>\n                </div>\n              </div>\n            ))}\n          </div>}",""]
  ];
  try {
    const res = await fetch(sourceUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let html = await res.text();
    if (!html.includes(broken)) throw new Error('Patch target not found');
    html = html.replace(broken, fixed);
    for (const [from, to] of replacements) {
      if (html.includes(from)) html = html.replace(from, to);
    }
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    document.getElementById('status').textContent = 'Erreur de chargement: ' + err.message;
  }
})();
</script>
</body>
</html>
