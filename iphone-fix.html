<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NotesFrais</title>
<style>
html,body{height:100%;margin:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3EF;color:#1A1A1A;display:flex;align-items:center;justify-content:center}
.loader{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:24px}
.dot{width:42px;height:42px;border-radius:50%;background:#2D5BE3;opacity:.14;animation:pulse 1.2s ease-in-out infinite}
.msg{font-size:14px;color:#6B6560}
@keyframes pulse{0%,100%{transform:scale(.92);opacity:.12}50%{transform:scale(1);opacity:.24}}
</style>
</head>
<body>
<div class="loader"><div class="dot"></div><div class="msg">Chargement de NotesFrais...</div></div>
<script>
(async function(){
  const logoScript = `<script>(function(){function inject(){if(document.getElementById('numeriq-brand-card'))return true;const title=[...document.querySelectorAll('div')].find(el=>el.textContent&&el.textContent.trim()==='NOTES DE FRAIS');if(!title||!title.parentElement)return false;const container=title.parentElement;const mike=[...container.children].find(el=>el.textContent&&el.textContent.trim()==='Mike');if(!mike)return false;const mobile=window.innerWidth<860;const card=document.createElement('div');card.id='numeriq-brand-card';card.style.cssText='background:linear-gradient(135deg,#0B1F4D 0%,#143B8C 58%,#1E56C9 100%);border-radius:18px;padding:'+(mobile?'18px 14px 14px':'20px 16px 15px')+';box-shadow:0 14px 34px rgba(21,58,138,.18);margin-bottom:12px;overflow:hidden';card.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:'+(mobile?10:12)+'px;min-height:'+(mobile?118:132)+'px;text-align:center"><div style="font-size:'+(mobile?13:14)+'px;font-weight:700;letter-spacing:.34em;color:#9EC5FF;text-indent:.34em">NUMERIQ</div><div style="font-size:'+(mobile?26:30)+'px;font-weight:800;letter-spacing:.18em;color:#FFF;text-indent:.18em;line-height:1">PAYROLL</div><div style="width:'+(mobile?72:84)+'px;height:2px;background:rgba(255,255,255,.22);border-radius:999px"></div><div style="font-size:11px;color:rgba(255,255,255,.72);letter-spacing:.18em;text-indent:.18em">NUMERIQ AG</div></div>';container.insertBefore(card,mike);return true;}const t=setInterval(()=>{if(inject())clearInterval(t)},250);window.addEventListener('load',inject);setTimeout(()=>clearInterval(t),8000);})();<\/script>`;
  try{
    const res=await fetch('app.html',{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    let html=await res.text();
    html=html.replace(' capture="environment"','');
    html=html.replace("function AddModal({onClose,onAdd,month}){\n  const isMobile=typeof window!=='undefined'&&window.innerWidth<860;","function AddModal({onClose,onAdd,month}){\n  const isMobile=typeof window!=='undefined'&&window.innerWidth<860;\n  const formInputStyle=isMobile?{...inp,fontSize:16,padding:'12px 14px'}:inp;\n  const dateInputStyle={...formInputStyle,WebkitAppearance:'none',appearance:'none',minHeight:isMobile?44:undefined};");
    html=html.replace(/style=\{inp\}/g,"style={typeof formInputStyle!=='undefined'?formInputStyle:inp}");
    html=html.replace('type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}','type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={dateInputStyle}');
    html=html.replace('autoFocus/>','autoFocus={!isMobile}/>');
    html=html.replace('</body>',logoScript+'</body>');
    document.open();document.write(html);document.close();
  }catch(err){
    document.body.innerHTML='<div class="loader"><div style="font-size:28px">!</div><div class="msg">Impossible de charger NotesFrais</div><div class="msg" style="font-size:12px">'+String(err.message||err)+'</div></div>';
  }
})();
</script>
</body>
</html>
